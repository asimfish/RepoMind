name: 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        描述你希望解决的问题或带来的价值，越具体越容易评估与实现。

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 要解决的问题
      description: 当前痛点或使用场景
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望如何工作（可含界面、交互、API 等设想）
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 若有其他实现思路或变通办法，请说明

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围（主观判断即可）
      options:
        - 仅前端 / 桌面 UI
        - 仅 Rust / Tauri 后端
        - 前后端都需要
        - 不确定
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 自查
      options:
        - label: 我已确认近期没有重复或高度相似的功能请求 Issue
          required: true
