name: Bug 报告
description: 报告可复现的缺陷或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可复现步骤与环境信息，便于我们定位问题。

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 用一两句话说明发生了什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 从启动应用到出现问题的具体操作顺序
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、RepoMind 版本、Node / Rust 版本等
      placeholder: |
        - OS:
        - RepoMind 版本:
        - 其他:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 控制台输出、崩溃栈、界面截图（可粘贴文本或说明附件路径）

  - type: checkboxes
    id: checklist
    attributes:
      label: 自查
      options:
        - label: 我已搜索过是否已有相同或相近的 Issue
          required: true
